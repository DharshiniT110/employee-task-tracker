{% extends "base.html" %}
{% block title %}500 | Server Error{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-5 fw-bold mb-3">500</h1>
    <p class="text-secondary mb-4">Something went wrong on the server. Please try again.</p>
    <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('home') }}" class="btn btn-primary">Go Back</a>
</div>
{% endblock %}
