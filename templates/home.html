{% extends "base.html" %}
{% block title %}Welcome | Employee Task Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5 text-center">
                <h1 class="mb-3">Employee Task Tracker</h1>
                <p class="text-muted mb-4">
                    This is a simple Flask project to manage daily tasks.
                    You can register, login, and track your task progress.
                </p>
                <div class="d-flex justify-content-center gap-2">
                    <a href="{{ url_for('register') }}" class="btn btn-primary">Register</a>
                    <a href="{{ url_for('login') }}" class="btn btn-outline-secondary">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
